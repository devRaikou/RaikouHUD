prefix: "<dark_gray>[<red>RaikouHUD</red>]</dark_gray> <gray>"

command:
  no-permission: "<#ff4d4d>You do not have permission.</#ff4d4d>"
  player-only: "<#ff4d4d>This command is player-only.</#ff4d4d>"
  player-not-found: "<#ff4d4d>Player not found: <white>{player}</white></#ff4d4d>"
  unknown-subcommand: "<#ff4d4d>Unknown subcommand. <gray>Use <white>/raikouhud help</white></gray>"
  help:
    header: "<red><bold>RaikouHUD</bold></red> <gray>Commands</gray>"
    line-help: "<gray>- <white>/raikouhud help</white> <dark_gray>|</dark_gray> show commands</gray>"
    line-reload: "<gray>- <white>/raikouhud reload</white> <dark_gray>|</dark_gray> reload config and language</gray>"
    line-status: "<gray>- <white>/raikouhud status [player]</white> <dark_gray>|</dark_gray> show module states</gray>"
    line-toggle: "<gray>- <white>/raikouhud toggle <module> [player]</white> <dark_gray>|</dark_gray> toggle player module</gray>"
    line-version: "<gray>- <white>/raikouhud version</white> <dark_gray>|</dark_gray> show plugin version</gray>"
  reload:
    success: "<#ff6b6b>Reload complete.</#ff6b6b>"
    failed: "<#ff4d4d>Reload failed. Check console.</#ff4d4d>"
  status:
    header: "<red>Status</red> <dark_gray>|</dark_gray> <gray>Locale <white>{locale}</white></gray>"
    module-line: "<gray>- {module}: {state}</gray>"
    player-line: "<dark_gray>  > </dark_gray><white>{player}</white> <dark_gray>|</dark_gray> <gray>{module}: {state}</gray>"
  toggle:
    usage: "<#ff4d4d>Usage: <white>/raikouhud toggle <scoreboard|bossbar|actionbar|tab> [player]</white>"
    unknown-module: "<#ff4d4d>Unknown module: <white>{module}</white>"
    target-required: "<#ff4d4d>Console must specify a target player."
    success: "<#ff6b6b>{module}</#ff6b6b><gray> for </gray><white>{player}</white><gray> is now </gray>{state}<gray>.</gray>"
  version: "<gray>RaikouHUD <white>v{version}</white></gray>"

state:
  enabled: "<#ff8a8a>enabled</#ff8a8a>"
  disabled: "<#c63f3f>disabled</#c63f3f>"

module:
  scoreboard: "Scoreboard"
  bossbar: "BossBar"
  actionbar: "ActionBar"
  tab: "TAB"
